<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EconoWatch — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <style>
      body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .login-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; max-width: 360px; }
      .brand-eco { color: #58a6ff; }
      .pin-input {
        background: #1c2128;
        border: 1px solid #30363d;
        color: #e6edf3;
        letter-spacing: 0.25em;
        font-size: 1.3rem;
        text-align: center;
      }
      .pin-input:focus {
        background: #1c2128;
        border-color: #58a6ff;
        color: #e6edf3;
        box-shadow: 0 0 0 2px rgba(88,166,255,0.15);
      }
    </style>
  </head>
  <body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="login-card p-4 w-100 mx-3">
      <div class="text-center mb-4">
        <i class="bi bi-graph-up-arrow mb-2 d-block" style="font-size: 2rem; color: #58a6ff;"></i>
        <h5 class="fw-bold mb-0"><span class="brand-eco">Econo</span>Watch</h5>
        <small class="text-muted">Enter your PIN to continue</small>
      </div>

      {% if error %}
      <div class="alert py-2 mb-3" style="background:#2d1a1a;border:1px solid #8a3000;color:#ffa657;font-size:0.9rem;">
        <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login" autocomplete="off">
        <div class="mb-3">
          <input
            type="password"
            name="pin"
            class="form-control pin-input"
            placeholder="••••"
            autofocus
            required
          />
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-unlock me-1"></i> Unlock Dashboard
        </button>
      </form>
    </div>
  </body>
</html>
