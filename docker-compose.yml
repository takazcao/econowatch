services:
  econowatch:
    build: .
    ports:
      - "5000:5000"
    volumes:
      # Persist SQLite DB across container restarts
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
